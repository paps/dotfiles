# Setting the prefix from C-b to C-q
set-option -g prefix C-q

# Free the original Ctrl-b prefix keybinding
unbind-key C-b

# Ensure that we can send Ctrl-q to other apps
bind-key C-q send-prefix

#setting the delay between prefix and command
set-option -g escape-time 1

# Disable bells and alerts
set-option -g bell-action none
set-option -g visual-activity off
set-option -g monitor-activity off

# terminal title
set-option -g set-titles on
set-option -g set-titles-string 'tmux · #W'

# splitting panes like in vim
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# moving between panes like in vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Quick window selection
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# Basic styling
set-option -g status-left ' #h/#S  '
set-option -g status-left-style 'bold,reverse'
set-option -g status-right '#{?pane_mode, #[bold reverse] #{pane_mode} ,}#{?client_prefix, #[bold reverse] PREFIX ,}'
set-option -g window-status-format '   #W#{?window_zoomed_flag, [Z],}   ' # Add a [Z] indicator for zoomed windows
set-option -g window-status-current-format '   #W#{?window_zoomed_flag, [Z],}   ' # Add a [Z] indicator for zoomed windows
set-option -g window-status-current-style 'bold,reverse'
set-option -g automatic-rename on
set-option -g pane-border-lines double
set-option -g status-interval 0

# Vi mode
set-option -g mode-keys vi
unbind-key [
bind-key Escape copy-mode
bind-key C-k copy-mode

# Copy & paste vi style
unbind-key p
bind-key p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

# move x clipboard into tmux paste buffer
bind-key C-p run "xclip -o | tmux load-buffer - ; tmux paste-buffer"

# move tmux copy buffer into x clipboard
bind-key y run "tmux save-buffer - | xclip -i"

# Move current window with [ and ]
bind-key -r ] swap-window -t +1 \; select-window -t +1
bind-key -r [ swap-window -t -1 \; select-window -t -1

# when pressing page-up, enter copy-mode and go up one page
bind-key -T root PPage if-shell -F "#{alternate_on}" "send-keys PPage" "copy-mode -e; send-keys PPage"

# mouse support
set-option -g mouse on

